<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* body{
            margin-left: auto;
            margin-right: auto;
        } */
        div#cards {
            margin:0 auto;
            width: 750px;
        }
        div#cards img{
            margin:25px;
        }
    </style>
</head>

<body onload="init()">

    <div id="cards">
        <img src="https://picsum.photos/100/200" alt="">
    </div>

    <script>
        function init() {
            let cardDiv = document.getElementById("cards")
            cardDiv.innerHTML = "";
            for (let i = 0; i < 10; i++) {
                cardDiv.innerHTML += "<img src=\"https://picsum.photos/100/200\" alt=\"\">";

            }
        }


    </script>
</body>

</html>
